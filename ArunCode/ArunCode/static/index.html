<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArunCode_Term — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0e0a;--bg2:#0f140f;--green:#39ff14;--green-dim:#1a7a06;
      --green-mid:#22c40a;--amber:#ffb300;--red:#ff3c3c;--border:#1e3a1e;
      --text:#c8e6c8;--mono:'Share Tech Mono',monospace;--display:'VT323',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:2rem;cursor:crosshair}
    body::before{content:'';position:fixed;inset:0;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
      pointer-events:none;z-index:9999}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

    .box{width:100%;max-width:460px;border:1px solid var(--border);background:var(--bg2);animation:fadeIn .8s ease both}
    .topbar{background:#0d1a0d;border-bottom:1px solid var(--border);padding:.6rem 1rem;
      display:flex;align-items:center;gap:.5rem;font-size:11px;color:var(--green-dim)}
    .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
    .dot-r{background:#ff3c3c}.dot-a{background:#ffb300}.dot-g{background:#39ff14}
    .topbar-title{margin:0 auto;font-size:12px;color:var(--green-mid);letter-spacing:1px}
    .inner{padding:2rem}
    .ascii{font-size:9px;line-height:1.2;color:var(--green-mid);text-shadow:0 0 6px var(--green-dim);
      white-space:pre;text-align:center;margin-bottom:1.2rem}
    .title{font-family:var(--display);font-size:2.4rem;color:var(--green);
      text-shadow:0 0 10px var(--green),0 0 30px var(--green-dim);text-align:center;
      letter-spacing:2px;margin-bottom:.3rem}
    .subtitle{text-align:center;font-size:11px;color:var(--green-dim);letter-spacing:1px;margin-bottom:1.5rem}

    /* mode toggle */
    .mode-toggle{display:flex;border:1px solid var(--border);margin-bottom:1.5rem}
    .mode-btn{flex:1;padding:.5rem;font-family:var(--mono);font-size:11px;letter-spacing:1px;
      background:transparent;border:none;color:var(--green-dim);cursor:pointer;transition:all .2s}
    .mode-btn.active{background:rgba(57,255,20,.08);color:var(--green)}

    /* steps */
    .steps{display:flex;margin-bottom:1.5rem;border:1px solid var(--border)}
    .step{flex:1;text-align:center;padding:.4rem .2rem;font-size:10px;letter-spacing:1px;
      color:var(--green-dim);border-right:1px solid var(--border);transition:all .3s}
    .step:last-child{border-right:none}
    .step.active{background:rgba(57,255,20,.07);color:var(--green)}
    .step.done{background:rgba(57,255,20,.04);color:var(--green-mid)}

    .form-step{display:none}.form-step.active{display:block}

    .field{margin-bottom:1.2rem}
    .field label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;
      color:var(--green-dim);margin-bottom:.4rem}
    .field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--green);
      font-family:var(--mono);font-size:14px;padding:.6rem .8rem;outline:none;
      transition:border-color .2s,box-shadow .2s;caret-color:var(--green)}
    .field input:focus{border-color:var(--green-mid);box-shadow:0 0 8px var(--green-dim)}
    .field input::placeholder{color:var(--green-dim);opacity:.6}
    .field-hint{font-size:10px;color:var(--green-dim);margin-top:.3rem}

    .error{font-size:11px;color:var(--red);text-align:center;margin-bottom:.8rem;min-height:16px}
    .error.shake{animation:shake .4s ease}
    .success{font-size:11px;color:var(--green);text-align:center;margin-bottom:.8rem;min-height:16px}

    .btn{width:100%;background:transparent;border:1px solid var(--green-dim);color:var(--green);
      font-family:var(--mono);font-size:13px;letter-spacing:2px;padding:.7rem;cursor:pointer;
      text-transform:uppercase;transition:all .2s;margin-top:.4rem}
    .btn:hover{background:rgba(57,255,20,.1);border-color:var(--green);box-shadow:0 0 12px var(--green-dim)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    .code-inputs{display:flex;gap:.6rem;justify-content:center;margin-bottom:1.2rem}
    .code-inputs input{width:46px;height:54px;background:var(--bg);border:1px solid var(--border);
      color:var(--green);font-family:var(--display);font-size:2rem;text-align:center;
      outline:none;transition:border-color .2s;caret-color:transparent}
    .code-inputs input:focus{border-color:var(--green-mid);box-shadow:0 0 8px var(--green-dim)}

    .verify-hint{text-align:center;font-size:11px;color:var(--green-dim);margin-bottom:1rem}
  </style>
</head>
<body>
<div class="box">
  <div class="topbar">
    <span class="dot dot-r"></span><span class="dot dot-a"></span><span class="dot dot-g"></span>
    <span class="topbar-title" id="topbar-title">aruncode_term — login</span>
  </div>
  <div class="inner">
    <div class="ascii">
  ______
 /     |
/      |____
\      |    |
 \_____|____|</div>
    <div class="title">ArunCode_Term</div>
    <div class="subtitle" id="subtitle">// SECURE ACCESS TERMINAL</div>

    <!-- MODE TOGGLE -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-login-mode" onclick="setMode('login')">LOGIN</button>
      <button class="mode-btn" id="btn-register-mode" onclick="setMode('register')">CREATE ACCOUNT</button>
    </div>

    <!-- ERROR / SUCCESS -->
    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>

    <!-- ── LOGIN FLOW ── -->
    <div id="login-flow">
      <div class="steps">
        <div class="step active" id="step-1">01 IDENTIFY</div>
        <div class="step" id="step-2">02 AUTH</div>
        <div class="step" id="step-3">03 VERIFY</div>
      </div>

      <!-- Step 1 -->
      <div class="form-step active" id="form-1">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="l-email" placeholder="you@example.com">
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="l-username" placeholder="ArunC">
        </div>
        <button class="btn" onclick="loginStep2()">CONTINUE →</button>
      </div>

      <!-- Step 2 -->
      <div class="form-step" id="form-2">
        <div class="field">
          <label>Password</label>
          <input type="password" id="l-password" placeholder="••••••••">
          <div class="field-hint">Logging in as: <span id="display-user" style="color:var(--green-mid)"></span></div>
        </div>
        <button class="btn" id="btn-auth" onclick="loginStep3()">AUTHENTICATE →</button>
      </div>

      <!-- Step 3: PIN (admin only) -->
      <div class="form-step" id="form-3">
        <div class="verify-hint">Enter your secret PIN</div>
        <div class="code-inputs" id="pin-inputs">
          <input type="text" maxlength="1" inputmode="numeric" onkeyup="pinNav(this,0)">
          <input type="text" maxlength="1" inputmode="numeric" onkeyup="pinNav(this,1)">
          <input type="text" maxlength="1" inputmode="numeric" onkeyup="pinNav(this,2)">
          <input type="text" maxlength="1" inputmode="numeric" onkeyup="pinNav(this,3)">
          <input type="text" maxlength="1" inputmode="numeric" onkeyup="pinNav(this,4)">
          <input type="text" maxlength="1" inputmode="numeric" onkeyup="pinNav(this,5)">
        </div>
        <button class="btn" onclick="loginVerify()">VERIFY & ENTER →</button>
      </div>
    </div>

    <!-- ── REGISTER FLOW ── -->
    <div id="register-flow" style="display:none">
      <div class="field">
        <label>Username</label>
        <input type="text" id="r-username" placeholder="cooluser123">
      </div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="r-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="r-password" placeholder="min 6 characters">
      </div>
      <button class="btn" id="btn-register" onclick="doRegister()">CREATE ACCOUNT →</button>
    </div>

  </div>
</div>

<script>
  let mode = 'login';
  let needsPin = false;

  function setMode(m) {
    mode = m;
    clearMsgs();
    document.getElementById('login-flow').style.display    = m === 'login'    ? 'block' : 'none';
    document.getElementById('register-flow').style.display = m === 'register' ? 'block' : 'none';
    document.getElementById('btn-login-mode').classList.toggle('active',    m === 'login');
    document.getElementById('btn-register-mode').classList.toggle('active', m === 'register');
    document.getElementById('topbar-title').textContent = m === 'login' ? 'aruncode_term — login' : 'aruncode_term — register';
    document.getElementById('subtitle').textContent     = m === 'login' ? '// SECURE ACCESS TERMINAL' : '// CREATE YOUR ACCOUNT';
    if (m === 'login') resetLogin();
  }

  function resetLogin() {
    setStep(1);
    ['l-email','l-username','l-password'].forEach(id => document.getElementById(id).value = '');
    document.querySelectorAll('#pin-inputs input').forEach(i => i.value = '');
  }

  function setStep(n) {
    [1,2,3].forEach(i => {
      document.getElementById('form-'+i).classList.toggle('active', i===n);
      const s = document.getElementById('step-'+i);
      s.classList.remove('active','done');
      if(i===n) s.classList.add('active');
      if(i<n)   s.classList.add('done');
    });
    clearMsgs();
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
  }

  function showSuccess(msg) {
    document.getElementById('success-msg').textContent = msg;
  }

  function clearMsgs() {
    document.getElementById('error-msg').textContent   = '';
    document.getElementById('success-msg').textContent = '';
  }

  function setLoading(id, loading, label) {
    const btn = document.getElementById(id);
    btn.disabled    = loading;
    btn.textContent = loading ? 'PLEASE WAIT...' : label;
  }

  // ── LOGIN STEP 1 ──
  function loginStep2() {
    const email    = document.getElementById('l-email').value.trim();
    const username = document.getElementById('l-username').value.trim();
    if (!email || !email.includes('@')) { showError('Please enter a valid email.'); return; }
    if (!username) { showError('Please enter your username.'); return; }
    document.getElementById('display-user').textContent = username;
    setStep(2);
  }

  // ── LOGIN STEP 2 ──
  async function loginStep3() {
    const email    = document.getElementById('l-email').value.trim();
    const username = document.getElementById('l-username').value.trim();
    const password = document.getElementById('l-password').value;
    if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

    setLoading('btn-auth', true, 'AUTHENTICATE →');
    try {
      const res  = await fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email, username, password})
      });
      const data = await res.json();
      if (!data.ok) { showError(data.error || 'Login failed.'); return; }

      needsPin = data.needs_pin;
      if (needsPin) {
        // Admin — needs PIN
        setStep(3);
        document.querySelector('#pin-inputs input').focus();
      } else {
        // Regular user — complete login directly
        const r2   = await fetch('/api/complete_login', {method:'POST'});
        const d2   = await r2.json();
        if (d2.ok) {
          sessionStorage.setItem('aruncode_user', d2.username);
          sessionStorage.setItem('aruncode_role', d2.role);
          window.location.href = '/home';
        } else {
          showError(d2.error || 'Login failed.');
        }
      }
    } catch { showError('Cannot reach server. Is app.py running?'); }
    finally  { setLoading('btn-auth', false, 'AUTHENTICATE →'); }
  }

  // ── LOGIN STEP 3: PIN ──
  function pinNav(input, idx) {
    const inputs = document.querySelectorAll('#pin-inputs input');
    if (input.value && idx < 5) inputs[idx+1].focus();
    if (!input.value && idx > 0 && event.key === 'Backspace') inputs[idx-1].focus();
  }

  async function loginVerify() {
    const inputs = document.querySelectorAll('#pin-inputs input');
    const code   = Array.from(inputs).map(i => i.value).join('');
    if (code.length < 6) { showError('Enter the full 6-digit PIN.'); return; }

    try {
      const res  = await fetch('/api/verify', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({code})
      });
      const data = await res.json();
      if (data.ok) {
        sessionStorage.setItem('aruncode_user', data.username);
        sessionStorage.setItem('aruncode_role', data.role);
        window.location.href = '/home';
      } else {
        showError(data.error || 'Incorrect PIN.');
      }
    } catch { showError('Cannot reach server.'); }
  }

  // ── REGISTER ──
  async function doRegister() {
    const username = document.getElementById('r-username').value.trim();
    const email    = document.getElementById('r-email').value.trim();
    const password = document.getElementById('r-password').value;

    if (!username || !email || !password) { showError('All fields are required.'); return; }
    if (username.length < 3)  { showError('Username must be at least 3 characters.'); return; }
    if (password.length < 6)  { showError('Password must be at least 6 characters.'); return; }
    if (!email.includes('@')) { showError('Invalid email address.'); return; }

    setLoading('btn-register', true, 'CREATE ACCOUNT →');
    try {
      const res  = await fetch('/api/register', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, email, password})
      });
      const data = await res.json();
      if (data.ok) {
        showSuccess('✔ Account created! You can now log in.');
        setTimeout(() => setMode('login'), 1500);
      } else {
        showError(data.error || 'Registration failed.');
      }
    } catch { showError('Cannot reach server.'); }
    finally  { setLoading('btn-register', false, 'CREATE ACCOUNT →'); }
  }
</script>
</body>
</html>
