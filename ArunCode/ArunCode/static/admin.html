<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArunCode — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0a0e0a;--bg2:#0f140f;--bg3:#131a13;--green:#39ff14;--green-dim:#1a7a06;--green-mid:#22c40a;
      --amber:#ffb300;--red:#ff3c3c;--blue:#00cfff;--border:#1e3a1e;--text:#c8e6c8;--mono:'Share Tech Mono',monospace;--title:'Orbitron',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh;display:flex;flex-direction:column;cursor:crosshair}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.1) 2px,rgba(0,0,0,0.1) 4px);pointer-events:none;z-index:9999}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.6rem 2rem;display:flex;align-items:center;gap:1rem;animation:fadeUp .5s ease}
    .brand{font-family:var(--title);font-size:.95rem;font-weight:900;letter-spacing:2px;color:var(--green);text-shadow:0 0 8px var(--green-dim)}
    .brand span{color:var(--red)}
    .topbar-right{margin-left:auto;display:flex;gap:.8rem}
    .btn-sm{background:transparent;border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:4px 12px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
    .btn-sm:hover{border-color:var(--green-dim);color:var(--green)}

    main{flex:1;padding:2rem;max-width:900px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem}

    .panel{border:1px solid var(--border);background:var(--bg2);animation:fadeUp .6s ease both}
    .panel-header{padding:.6rem 1.2rem;background:var(--bg3);border-bottom:1px solid var(--border);font-size:9px;letter-spacing:2px;color:var(--green-dim);display:flex;justify-content:space-between;align-items:center}

    .user-table{width:100%;border-collapse:collapse}
    .user-table th{padding:.6rem 1.2rem;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--green-dim);border-bottom:1px solid var(--border);text-align:left;background:var(--bg3)}
    .user-table td{padding:.8rem 1.2rem;border-bottom:1px solid #0f1a0f;font-size:12px}
    .user-table tr:last-child td{border-bottom:none}
    .user-table tr:hover td{background:rgba(57,255,20,.02)}
    .role-admin{color:var(--amber);font-size:9px;letter-spacing:1px;border:1px solid #7a5500;padding:2px 8px}
    .role-user{color:var(--green-dim);font-size:9px;letter-spacing:1px;border:1px solid var(--green-dim);padding:2px 8px}
    .btn-delete{background:transparent;border:1px solid #3a1a1a;color:var(--red);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:3px 10px;cursor:pointer;transition:all .2s}
    .btn-delete:hover{background:rgba(255,60,60,.08);border-color:var(--red)}
    .btn-delete:disabled{opacity:.3;cursor:not-allowed}

    .no-access{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:1rem;color:var(--green-dim)}
    .no-access h2{font-family:var(--title);color:var(--red);font-size:1.2rem;letter-spacing:3px}

    .msg{padding:.8rem 1.2rem;font-size:11px;display:none}
    .msg.show{display:block}
    .msg.ok{color:var(--green);border-left:2px solid var(--green)}
    .msg.err{color:var(--red);border-left:2px solid var(--red)}
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">ArunCode <span>Admin</span></div>
  <div class="topbar-right">
    <a class="btn-sm" href="/home">← Dashboard</a>
    <a class="btn-sm" href="/">⌂ Home</a>
  </div>
</div>

<main id="main-content">
  <div class="no-access"><div style="font-size:2rem">🔒</div><h2>CHECKING ACCESS...</h2></div>
</main>

<script>
async function init() {
  const res  = await fetch('/api/me').catch(()=>null);
  if (!res || !res.ok) { showNoAccess('Not logged in.'); return; }
  const me = await res.json();
  if (me.role !== 'admin') { showNoAccess('Admin access required.'); return; }
  loadPanel();
}

function showNoAccess(msg) {
  document.getElementById('main-content').innerHTML =
    `<div class="no-access"><div style="font-size:2rem">🚫</div><h2>ACCESS DENIED</h2><div>${msg}</div><a class="btn-sm" href="/terminal">← Login</a></div>`;
}

async function loadPanel() {
  const res  = await fetch('/api/admin/users');
  const data = await res.json();
  if (!data.ok) { showNoAccess('Could not load users.'); return; }

  const users = data.users;
  const rows  = Object.entries(users).map(([u, d]) => `
    <tr id="row-${u}">
      <td>${u}</td>
      <td>${d.email}</td>
      <td><span class="role-${d.role}">${d.role.toUpperCase()}</span></td>
      <td><button class="btn-delete" onclick="deleteUser('${u}')" ${u==='ArunC'?'disabled':''}>DELETE</button></td>
    </tr>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="panel">
      <div class="panel-header"><span>▸ User Management</span><span>${Object.keys(users).length} accounts</span></div>
      <div class="msg" id="msg"></div>
      <table class="user-table">
        <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody id="user-tbody">${rows}</tbody>
      </table>
    </div>`;
}

async function deleteUser(username) {
  if (!confirm(`Delete account "${username}"? This cannot be undone.`)) return;
  const res  = await fetch(`/api/admin/users/${username}`, {method:'DELETE'});
  const data = await res.json();
  const msg  = document.getElementById('msg');
  if (data.ok) {
    document.getElementById(`row-${username}`)?.remove();
    msg.className = 'msg ok show';
    msg.textContent = `✔ Account "${username}" deleted.`;
  } else {
    msg.className = 'msg err show';
    msg.textContent = `✖ ${data.error}`;
  }
  setTimeout(()=>msg.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
